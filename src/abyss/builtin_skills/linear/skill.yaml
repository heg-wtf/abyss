name: linear
emoji: "\U0001F4DD"
description: "Linear issue tracking via @tacticlaunch/mcp-linear (stdio, personal API token)"
type: mcp
status: inactive
required_commands:
  - npx
install_hints:
  npx: "Install Node.js (https://nodejs.org/) — npx ships with it"
environment_variables:
  - LINEAR_API_TOKEN
allowed_tools:
  # Open the whole Linear surface — the upstream package exposes ~140
  # tools (issues / projects / cycles / roadmaps / releases / docs /
  # webhooks / audit). Enumerating each one bloats the whitelist and
  # silently denies any tool the bot legitimately needs but we forgot
  # to list (caught in production via ``linear_createProject``).
  # SKILL.md still enforces "confirm-before-mutating" as a behavioral
  # rule, so this is a permission grant, not a safety bypass.
  - "mcp__linear__*"
